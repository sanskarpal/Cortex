name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows is intentionally unsupported (macOS / Linux only).
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Core + dev only: the suite is fully offline by design (fake embedding
      # backend), so the heavy [ml] extra is never needed in CI.
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -q
